<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | CarSharing</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <style>
        .auth-page {
            min-height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 40px 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        .auth-card {
            background: #0A0A0A;

            border-radius: 24px;

            padding: 48px;

            border: 1px solid #1A1A1A;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo {
            font-size: 32px;
            font-weight: 800;
            color: #FFFFFF;
            letter-spacing: -1px;
            margin-bottom: 8px;
            text-decoration: none;
            display: block;
        }

        .auth-logo span {
            background: linear-gradient(135deg, #00DC82 0%, #00FF95 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-header p {
            color: #666666;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: #888888;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            background: #1A1A1A;
            border: 1px solid #2A2A2A;
            border-radius: 12px;
            color: #FFFFFF;
            font-size: 15px;
            font-family: 'Manrope', sans-serif;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;

            border-color: #00DC82;

            box-shadow: 0 0 0 3px rgba(0, 220, 130, 0.1);
        }

        .form-group input::placeholder {
            color: #555555;
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            margin-top: 8px;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            color: #444444;
            font-size: 14px;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';

            flex: 1;

            height: 1px;
            background: #2A2A2A;
        }

        .auth-divider span {
            padding: 0 16px;
        }

        .social-auth {
            display: grid;
            grid-template-columns: repeat(2, 1fr);

            gap: 16px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            background: #1A1A1A;
            border: 1px solid #2A2A2A;
            border-radius: 12px;
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .social-btn:hover {
            border-color: #00DC82;
            background: #1F1F1F;
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 32px;
            color: #666666;
            font-size: 14px;
        }

        .auth-footer a {
            color: #00DC82;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #666666;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 24px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #00DC82;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #00DC82;
            cursor: pointer;
        }

        .checkbox-group label {
            color: #888888;
            font-size: 14px;
            cursor: pointer;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 24px;
        }

        .forgot-password a {
            color: #666666;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-password a:hover {
            color: #00DC82;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <a href="index.html" class="back-link">
                ← На главную
            </a>

            <div class="auth-card">
                <div class="auth-header">
                    <a href="index.html" class="auth-logo">CAR<span>SHARING</span></a>
                    <p>Войдите в свой аккаунт</p>
                </div>

                <form>
                    <div class="form-group">
                        <label for="email">Email</label>

                        <input type="email" id="email" placeholder="name@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <div class="forgot-password">
                        <a href="forgot-password.html">Забыли пароль?</a>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="remember">
                        <label for="remember">Запомнить меня</label>
                    </div>

                    <button type="submit" class="btn btn-primary auth-btn">Войти</button>

                    <div id="login-error" style="color: #ff6b6b; font-size: 14px; margin-top: 16px; display: none;"></div>
                </form>

                <div class="auth-divider">
                    <span>или войти через</span>
                </div>

                <div class="social-auth">
                    <button class="social-btn">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Google
                    </button>

                    <button class="social-btn">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
                        </svg>
                        GitHub
                    </button>
                </div>

                <div class="auth-footer">
                    Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const errorDiv = document.getElementById('login-error');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorDiv.style.display = 'none';
                errorDiv.textContent = '';

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                try {
                    const result = await authAPI.login(email, password);

                    if (result.success) {
                        authHelpers.saveAuthData(result.token, result.user);
                        window.location.href = 'account.html';
                    } else {
                        errorDiv.textContent = result.message || 'Ошибка входа';
                        errorDiv.style.display = 'block';
                    }
                } catch (error) {
                    errorDiv.textContent = 'Ошибка подключения к серверу';
                    errorDiv.style.display = 'block';
                    console.error('Ошибка входа:', error);
                }
            });
        });
    </script>
</body>
</html>
